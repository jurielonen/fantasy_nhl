name: fantasy_nhl
description: Fantasy NHL Companion App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  cached_network_image: ^3.4.1
  dio: ^5.9.1
  drift: ^2.21.0
  drift_flutter: ^0.2.4
  fl_chart: ^1.1.1
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.1.0
  flutter_svg: ^2.2.3
  intl: any
  flutter_slidable: ^4.0.3
  freezed_annotation: ^3.1.0
  go_router: ^17.1.0
  json_annotation: ^4.9.0
  retrofit: ^4.9.2
  riverpod_annotation: ^4.0.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.21.0
  freezed: ^3.2.3
  json_serializable: ^6.11.2
  build_runner: ^2.11.1
  riverpod_generator: ^4.0.0+1
  retrofit_generator: ^10.2.1
  mocktail: ^1.0.4
  go_router_builder: ^4.2.0
  build_verify: ^3.1.1

dependency_overrides:
  # go_router_builder 4.2.0 constrains go_router to ^16.2.0; override to allow 17.x.
  # The only change in go_router 17 (notifyRootObserver) does not affect typed routing.
  go_router: ^17.1.0

flutter:
  generate: true
  uses-material-design: true
